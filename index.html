var board,selected,turn,enPassant,pendingPromotion,moved,gameOver,drawOfferedBy,flipped,statusMessage,lastMove,checkmateSquare,checkingPieceSquare;
function cloneBoard(b){return JSON.parse(JSON.stringify(b));} function sign(x){return x>0?1:x<0?-1:0;} function capitalize(s){return s.charAt(0).toUpperCase()+s.slice(1);} function isOwnPiece(p){return turn==='white'?p===p.toUpperCase():p===p.toLowerCase();}
function initBoard(){board=[['r','n','b','q','k','b','n','r'],['p','p','p','p','p','p','p','p'],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['P','P','P','P','P','P','P','P'],['R','N','B','Q','K','B','N','R']];selected=null;turn='white';enPassant=null;pendingPromotion=null;moved={};gameOver=false;drawOfferedBy=null;flipped=false;statusMessage='';lastMove=null;checkmateSquare=null;checkingPieceSquare=null;document.getElementById('acceptDrawBtn').style.display='none';draw();}
function straightClear(r1,c1,r2,c2,b){if(r1!==r2&&c1!==c2)return false;var dr=sign(r2-r1),dc=sign(c2-c1),r=r1+dr,c=c1+dc;while(r!==r2||c!==c2){if(b[r][c])return false;r+=dr;c+=dc;}return true;} function diagonalClear(r1,c1,r2,c2,b){if(Math.abs(r2-r1)!==Math.abs(c2-c1))return false;var dr=sign(r2-r1),dc=sign(c2-c1),r=r1+dr,c=c1+dc;while(r!==r2){if(b[r][c])return false;r+=dr;c+=dc;}return true;}
function findKing(color,b){var r,c,k=color==='white'?'K':'k';for(r=0;r<8;r++)for(c=0;c<8;c++)if(b[r][c]===k)return{r:r,c:c};return null;} function isSquareAttacked(r,c,by,b){var i,j,p,w,dr,dc,dir;for(i=0;i<8;i++)for(j=0;j<8;j++){p=b[i][j];if(!p)continue;w=p===p.toUpperCase();if((by==='white'&&!w)||(by==='black'&&w))continue;dr=r-i;dc=c-j;switch(p.toLowerCase()){case'p':dir=w?-1:1;if(dr===dir&&Math.abs(dc)===1)return true;break;case'n':if((Math.abs(dr)===2&&Math.abs(dc)===1)||(Math.abs(dr)===1&&Math.abs(dc)===2))return true;break;case'b':if(diagonalClear(i,j,r,c,b))return true;break;case'r':if(straightClear(i,j,r,c,b))return true;break;case'q':if(diagonalClear(i,j,r,c,b)||straightClear(i,j,r,c,b))return true;break;case'k':if(Math.abs(dr)<=1&&Math.abs(dc)<=1)return true;}}return false;} function isCheck(color,b){b=b||board;var k=findKing(color,b);return k?isSquareAttacked(k.r,k.c,color==='white'?'black':'white',b):false;}
function isValidMove(f,t){var piece=board[f.r][f.c],target=board[t.r][t.c],dr=t.r-f.r,dc=t.c-f.c,row,enemy;if(target&&isOwnPiece(target))return false;switch(piece.toLowerCase()){case'p':var dir=piece==='P'?-1:1;if(dc===0&&!target&&dr===dir)return true;if(dc===0&&!target&&dr===2*dir&&((piece==='P'&&f.r===6)||(piece==='p'&&f.r===1))&&!board[f.r+dir][f.c])return true;if(Math.abs(dc)===1&&dr===dir){if(target)return true;if(enPassant&&t.r===enPassant.r&&t.c===enPassant.c)return true;}return false;case'r':return straightClear(f.r,f.c,t.r,t.c,board);case'b':return diagonalClear(f.r,f.c,t.r,t.c,board);case'q':return straightClear(f.r,f.c,t.r,t.c,board)||diagonalClear(f.r,f.c,t.r,t.c,board);case'n':return (Math.abs(dr)===2&&Math.abs(dc)===1)||(Math.abs(dr)===1&&Math.abs(dc)===2);case'k':if(Math.abs(dr)<=1&&Math.abs(dc)<=1)return true;if(dr===0&&Math.abs(dc)===2){row=f.r;if((piece==='K'&&row!==7)||(piece==='k'&&row!==0)||f.c!==4||moved[row+'_4'])return false;enemy=turn==='white'?'black':'white';if(dc===2){if(board[row][5]||board[row][6]||!board[row][7]||moved[row+'_7'])return false;return !isSquareAttacked(row,4,enemy,board)&&!isSquareAttacked(row,5,enemy,board)&&!isSquareAttacked(row,6,enemy,board);}if(dc===-2){if(board[row][1]||board[row][2]||board[row][3]||!board[row][0]||moved[row+'_0'])return false;return !isSquareAttacked(row,4,enemy,board)&&!isSquareAttacked(row,3,enemy,board)&&!isSquareAttacked(row,2,enemy,board);}}}return false;}
function isLegalMove(f,t){var temp=cloneBoard(board),piece=temp[f.r][f.c],color;if(piece.toLowerCase()==='p'&&enPassant&&t.r===enPassant.r&&t.c===enPassant.c)temp[f.r][t.c]='';temp[t.r][t.c]=piece;temp[f.r][f.c]='';if(piece==='P'&&t.r===0)temp[t.r][t.c]='Q';if(piece==='p'&&t.r===7)temp[t.r][t.c]='q';color=piece===piece.toUpperCase()?'white':'black';return !isCheck(color,temp);} function getLegalMoves(f){var m=[],r,c;if(!f)return m;for(r=0;r<8;r++)for(c=0;c<8;c++)if(isValidMove(f,{r:r,c:c})&&isLegalMove(f,{r:r,c:c}))m.push({r:r,c:c});return m;}
function hasMoves(color){var r,c,r2,c2,p;for(r=0;r<8;r++)for(c=0;c<8;c++){p=board[r][c];if(!p)continue;if(color==='white'&&p!==p.toUpperCase())continue;if(color==='black'&&p!==p.toLowerCase())continue;for(r2=0;r2<8;r2++)for(c2=0;c2<8;c2++)if(isValidMove({r:r,c:c},{r:r2,c:c2})&&isLegalMove({r:r,c:c},{r:r2,c:c2}))return true;}return false;} function isCheckmate(color){return isCheck(color)&&!hasMoves(color);} function isStalemate(color){return !isCheck(color)&&!hasMoves(color);} function findCheckingPiece(color){var king=findKing(color,board),op=color==='white'?'black':'white',r,c,p,w;if(!king)return null;for(r=0;r<8;r++)for(c=0;c<8;c++){p=board[r][c];if(!p)continue;w=p===p.toUpperCase();if(op==='white'&&!w||op==='black'&&w)continue;if(isValidMove({r:r,c:c},king))return{r:r,c:c};}return null;}
function triggerPromotion(pos,color){pendingPromotion={pos:pos,color:color};var el=document.getElementById('promotion'),opts=['q','r','b','n'],i,piece;el.innerHTML='Choose Promotion:<br>';for(i=0;i<opts.length;i++){piece=color==='white'?opts[i].toUpperCase():opts[i];el.innerHTML+='<button onclick="applyPromotion(\''+piece+'\')">'+pieces[piece]+'</button>';}el.style.display='block';}
function applyPromotion(piece){board[pendingPromotion.pos.r][pendingPromotion.pos.c]=piece;pendingPromotion=null;document.getElementById('promotion').style.display='none';turn=turn==='white'?'black':'white';draw();}
function makeMove(f,t){var piece=board[f.r][f.c];if(piece.toLowerCase()==='p'&&enPassant&&t.r===enPassant.r&&t.c===enPassant.c)board[f.r][t.c]='';if(piece.toLowerCase()==='k'&&Math.abs(t.c-f.c)===2){if(t.c===6){board[f.r][5]=board[f.r][7];board[f.r][7]='';}else{board[f.r][3]=board[f.r][0];board[f.r][0]='';}}board[t.r][t.c]=piece;board[f.r][f.c]='';moved[f.r+'_'+f.c]=true;if(piece==='P'&&t.r===0){triggerPromotion(t,'white');return;}if(piece==='p'&&t.r===7){triggerPromotion(t,'black');return;}enPassant=null;if(piece.toLowerCase()==='p'&&Math.abs(t.r-f.r)===2)enPassant={r:(f.r+t.r)/2,c:f.c};lastMove={from:{r:f.r,c:f.c},to:{r:t.r,c:t.c}};}
function handleTap(r,c){if(gameOver||pendingPromotion)return;var piece=board[r][c],a;if(!selected){if(piece&&isOwnPiece(piece))selected={r:r,c:c};}else{if(piece&&isOwnPiece(piece))selected={r:r,c:c};else if(selected.r===r&&selected.c===c)selected=null;else if(isValidMove(selected,{r:r,c:c})&&isLegalMove(selected,{r:r,c:c})){makeMove(selected,{r:r,c:c});if(!pendingPromotion){turn=turn==='white'?'black':'white';checkmateSquare=null;checkingPieceSquare=null;if(isCheckmate(turn)){gameOver=true;statusMessage='Checkmate! '+(turn==='white'?'Black':'White')+' wins';checkmateSquare=findKing(turn,board);a=findCheckingPiece(turn);if(a)checkingPieceSquare=a;}else if(isStalemate(turn)){gameOver=true;statusMessage='Stalemate! Draw';}else if(isCheck(turn)){a=findCheckingPiece(turn);if(a)checkingPieceSquare=a;}drawOfferedBy=null;document.getElementById('acceptDrawBtn').style.display='none';}selected=null;}draw();}}
function draw(){var html='<table>',r,c,dr,dc,piece,cls,moves=getLegalMoves(selected),i,msg;for(r=0;r<8;r++){html+='<tr>';for(c=0;c<8;c++){dr=flipped?7-r:r;dc=flipped?7-c:c;cls=((dr+dc)%2?'dark':'light');if(selected&&selected.r===dr&&selected.c===dc)cls+=' selected';if(lastMove&&lastMove.from.r===dr&&lastMove.from.c===dc)cls+=' lastfrom';if(lastMove&&lastMove.to.r===dr&&lastMove.to.c===dc)cls+=' lastto';if(checkmateSquare&&checkmateSquare.r===dr&&checkmateSquare.c===dc)cls+=' mate';if(checkingPieceSquare&&checkingPieceSquare.r===dr&&checkingPieceSquare.c===dc)cls+=' checking';for(i=0;i<moves.length;i++)if(moves[i].r===dr&&moves[i].c===dc){cls+=' move';break;}piece=board[dr][dc];html+='<td onclick="handleTap('+dr+','+dc+')" class="'+cls+'">'+(piece?pieces[piece]:'&nbsp;')+'</td>';}html+='</tr>';}html+='</table>';document.getElementById('board').innerHTML=html;msg=statusMessage||('Turn: '+capitalize(turn));if(!gameOver&&isCheck(turn))msg='Check! '+msg;if(drawOfferedBy&&!gameOver)msg+=' | Draw offered by '+capitalize(drawOfferedBy);document.getElementById('info').innerHTML=msg;}
function resign(){if(gameOver)return;statusMessage=(turn==='white'?'Black':'White')+' wins (resignation)';gameOver=true;draw();} function offerDraw(){if(gameOver)return;drawOfferedBy=turn;document.getElementById('acceptDrawBtn').style.display='inline-block';draw();} function acceptDraw(){if(gameOver||!drawOfferedBy)return;statusMessage='Draw agreed';gameOver=true;drawOfferedBy=null;document.getElementById('acceptDrawBtn').style.display='none';draw();} function flipBoard(){flipped=!flipped;draw();} function resetGame(){initBoard();} initBoard();
</script></body></html>
