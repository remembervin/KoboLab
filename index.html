<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kindle Kobo Chess ES5</title>

<style>
body {
  max-width: 720px;
  margin: 0 auto;
  padding: 5px;
  font-family: sans-serif;
  text-align: center;
  background: #fff;
  color: #000;
}

h2 {
  margin: 8px 0;
}

#info {
  font-size: 18px;
  margin: 8px;
  min-height: 24px;
}

#board {
  margin: 10px auto;
}

#board table {
  border-collapse: collapse;
  margin: 0 auto;
  border: 2px solid #000;
}

#board td {
  width: 42px;
  height: 42px;
  text-align: center;
  vertical-align: middle;
  font-size: 30px;
  border: 1px solid #666;
  cursor: pointer;
  padding: 0;
}

.light {
  background: #eee;
}

.dark {
  background: #aaa;
}

.selected {
  outline: 3px solid #000;
}

.move {
  box-shadow: inset 0 0 0 3px #000;
}

.lastfrom {
  box-shadow: inset 0 0 0 3px #333;
}

.lastto {
  box-shadow: inset 0 0 0 4px #000;
}

.checking {
  outline: 3px dotted #000;
}

.mate {
  box-shadow: inset 0 0 10px 4px #000;
}

.whitePiece {
  font-weight: normal;
  text-shadow: 0 0 1px #000;
}

.blackPiece {
  font-weight: bold;
}

#promotion {
  display: none;
  margin: 10px;
}

#promotion button {
  font-size: 28px;
  padding: 8px;
  margin: 4px;
}

.controls {
  margin: 10px;
}

.controls button {
  font-size: 16px;
  padding: 6px 10px;
  margin: 4px;
}
</style>
</head>

<body>

<h2>Kindle Kobo Chess ES5</h2>

<div id="info"></div>
<div id="board"></div>
<div id="promotion"></div>

<div class="controls">
  <button onclick="resign()">Resign</button>
  <button onclick="offerDraw()">Offer Draw</button>
  <button onclick="flipBoard()">Flip</button>
  <button id="acceptDrawBtn" onclick="acceptDraw()" style="display:none;">Accept Draw</button>
  <button onclick="resetGame()">Reset</button>
</div>

<script>
var pieces = {
  r:'♜', n:'♞', b:'♝', q:'♛', k:'♚', p:'♟',
  R:'♖', N:'♘', B:'♗', Q:'♕', K:'♔', P:'♙'
};

var board;
var selected;
var turn;
var enPassant;
var pendingPromotion;
var moved;
var gameOver;
var drawOfferedBy;
var flipped;
var statusMessage;
var lastMove;
var checkmateSquare;
var checkingPieceSquare;

function initBoard() {
  board = [
    ['r','n','b','q','k','b','n','r'],
    ['p','p','p','p','p','p','p','p'],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['P','P','P','P','P','P','P','P'],
    ['R','N','B','Q','K','B','N','R']
  ];

  selected = null;
  turn = 'white';
  enPassant = null;
  pendingPromotion = null;
  moved = {};
  gameOver = false;
  drawOfferedBy = null;
  flipped = false;
  statusMessage = '';
  lastMove = null;
  checkmateSquare = null;
  checkingPieceSquare = null;

  document.getElementById('acceptDrawBtn').style.display = 'none';

  draw();
}

function cloneBoard(b) {
  return JSON.parse(JSON.stringify(b));
}

function sign(x) {
  if (x > 0) return 1;
  if (x < 0) return -1;
  return 0;
}

function capitalize(s) {
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function isOwnPiece(p) {
  if (turn === 'white') {
    return p === p.toUpperCase();
  }
  return p === p.toLowerCase();
}

function findKing(color, b) {
  var r, c;
  var king = (color === 'white') ? 'K' : 'k';

  for (r = 0; r < 8; r++) {
    for (c = 0; c < 8; c++) {
      if (b[r][c] === king) {
        return { r:r, c:c };
      }
    }
  }

  return null;
}

function straightClear(r1, c1, r2, c2, b) {
  if (r1 !== r2 && c1 !== c2) {
    return false;
  }

  var dr = sign(r2 - r1);
  var dc = sign(c2 - c1);
  var r = r1 + dr;
  var c = c1 + dc;

  while (r !== r2 || c !== c2) {
    if (b[r][c]) {
      return false;
    }
    r += dr;
    c += dc;
  }

  return true;
}

function diagonalClear(r1, c1, r2, c2, b) {
  if (Math.abs(r2 - r1) !== Math.abs(c2 - c1)) {
    return false;
  }

  var dr = sign(r2 - r1);
  var dc = sign(c2 - c1);
  var r = r1 + dr;
  var c = c1 + dc;

  while (r !== r2) {
    if (b[r][c]) {
      return false;
    }
    r += dr;
    c += dc;
  }

  return true;
}

function isSquareAttacked(r, c, byColor, b) {
  var i, j, p, isWhite, dr, dc, dir;

  for (i = 0; i < 8; i++) {
    for (j = 0; j < 8; j++) {
      p = b[i][j];

      if (!p) {
        continue;
      }

      isWhite = (p === p.toUpperCase());

      if (byColor === 'white' && !isWhite) {
        continue;
      }

      if (byColor === 'black' && isWhite) {
        continue;
      }

      dr = r - i;
      dc = c - j;

      switch (p.toLowerCase()) {
        case 'p':
          dir = isWhite ? -1 : 1;
          if (dr === dir && Math.abs(dc) === 1) {
            return true;
          }
          break;

        case 'n':
          if (
            (Math.abs(dr) === 2 && Math.abs(dc) === 1) ||
            (Math.abs(dr) === 1 && Math.abs(dc) === 2)
          ) {
            return true;
          }
          break;

        case 'b':
          if (diagonalClear(i, j, r, c, b)) {
            return true;
          }
          break;

        case 'r':
          if (straightClear(i, j, r, c, b)) {
            return true;
          }
          break;

        case 'q':
          if (
            diagonalClear(i, j, r, c, b) ||
            straightClear(i, j, r, c, b)
          ) {
            return true;
          }
          break;

        case 'k':
          if (Math.abs(dr) <= 1 && Math.abs(dc) <= 1) {
            return true;
          }
          break;
      }
    }
  }

  return false;
}

function isCheck(color, b) {
  if (!b) {
    b = board;
  }

  var king = findKing(color, b);

  if (!king) {
    return false;
  }

  return isSquareAttacked(
    king.r,
    king.c,
    color === 'white' ? 'black' : 'white',
    b
  );
}

function isValidMove(from, to) {
  var piece = board[from.r][from.c];
  var target = board[to.r][to.c];
  var dr = to.r - from.r;
  var dc = to.c - from.c;
  var row;
  var enemy;

  if (target && isOwnPiece(target)) {
    return false;
  }

  switch (piece.toLowerCase()) {
    case 'p':
      var dir = (piece === 'P') ? -1 : 1;

      if (dc === 0 && !target && dr === dir) {
        return true;
      }

      if (dc === 0 && !target && dr === 2 * dir) {
        if (
          (piece === 'P' && from.r === 6) ||
          (piece === 'p' && from.r === 1)
        ) {
          if (!board[from.r + dir][from.c]) {
            return true;
          }
        }
      }

      if (Math.abs(dc) === 1 && dr === dir) {
        if (target) {
          return true;
        }

        if (
          enPassant &&
          to.r === enPassant.r &&
          to.c === enPassant.c
        ) {
          return true;
        }
      }

      return false;

    case 'r':
      return straightClear(from.r, from.c, to.r, to.c, board);

    case 'b':
      return diagonalClear(from.r, from.c, to.r, to.c, board);

    case 'q':
      return (
        straightClear(from.r, from.c, to.r, to.c, board) ||
        diagonalClear(from.r, from.c, to.r, to.c, board)
      );

    case 'n':
      return (
        (Math.abs(dr) === 2 && Math.abs(dc) === 1) ||
        (Math.abs(dr) === 1 && Math.abs(dc) === 2)
      );

    case 'k':
      if (Math.abs(dr) <= 1 && Math.abs(dc) <= 1) {
        return true;
      }
	  
	  
	      if (dr === 0 && Math.abs(dc) === 2) {
        row = from.r;

        if (
          (piece === 'K' && row !== 7) ||
          (piece === 'k' && row !== 0) ||
          from.c !== 4 ||
          moved[row + '_4']
        ) {
          return false;
        }

        enemy = (turn === 'white') ? 'black' : 'white';

        if (dc === 2) {
          if (
            board[row][5] ||
            board[row][6] ||
            !board[row][7] ||
            moved[row + '_7']
          ) {
            return false;
          }

          if (
            isSquareAttacked(row, 4, enemy, board) ||
            isSquareAttacked(row, 5, enemy, board) ||
            isSquareAttacked(row, 6, enemy, board)
          ) {
            return false;
          }

          return true;
        }

        if (dc === -2) {
          if (
            board[row][1] ||
            board[row][2] ||
            board[row][3] ||
            !board[row][0] ||
            moved[row + '_0']
          ) {
            return false;
          }

          if (
            isSquareAttacked(row, 4, enemy, board) ||
            isSquareAttacked(row, 3, enemy, board) ||
            isSquareAttacked(row, 2, enemy, board)
          ) {
            return false;
          }

          return true;
        }
      }

      return false;
  }

  return false;
}

function isLegalMove(from, to) {
  var temp = cloneBoard(board);
  var piece = temp[from.r][from.c];
  var color;

  if (
    piece.toLowerCase() === 'p' &&
    enPassant &&
    to.r === enPassant.r &&
    to.c === enPassant.c
  ) {
    temp[from.r][to.c] = '';
  }

  temp[to.r][to.c] = piece;
  temp[from.r][from.c] = '';

  if (piece === 'P' && to.r === 0) {
    temp[to.r][to.c] = 'Q';
  }

  if (piece === 'p' && to.r === 7) {
    temp[to.r][to.c] = 'q';
  }

  color = (piece === piece.toUpperCase()) ? 'white' : 'black';

  return !isCheck(color, temp);
}

function getLegalMoves(from) {
  var moves = [];
  var r, c;

  if (!from || from.r < 0) {
    return moves;
  }

  for (r = 0; r < 8; r++) {
    for (c = 0; c < 8; c++) {
      if (
        isValidMove(from, {r:r, c:c}) &&
        isLegalMove(from, {r:r, c:c})
      ) {
        moves.push({r:r, c:c});
      }
    }
  }

  return moves;
}

function hasMoves(color) {
  var r, c, r2, c2, p;

  for (r = 0; r < 8; r++) {
    for (c = 0; c < 8; c++) {
      p = board[r][c];

      if (!p) {
        continue;
      }

      if (color === 'white' && p !== p.toUpperCase()) {
        continue;
      }

      if (color === 'black' && p !== p.toLowerCase()) {
        continue;
      }

      for (r2 = 0; r2 < 8; r2++) {
        for (c2 = 0; c2 < 8; c2++) {
          if (
            isValidMove({r:r,c:c}, {r:r2,c:c2}) &&
            isLegalMove({r:r,c:c}, {r:r2,c:c2})
          ) {
            return true;
          }
        }
      }
    }
  }

  return false;
}

function isCheckmate(color) {
  return isCheck(color) && !hasMoves(color);
}

function isStalemate(color) {
  return !isCheck(color) && !hasMoves(color);
}

function findCheckingPiece(color) {
  var king = findKing(color, board);
  var opponent = (color === 'white') ? 'black' : 'white';
  var r, c, p, isWhite;

  if (!king) {
    return null;
  }

  for (r = 0; r < 8; r++) {
    for (c = 0; c < 8; c++) {
      p = board[r][c];

      if (!p) {
        continue;
      }

      isWhite = (p === p.toUpperCase());

      if (opponent === 'white' && !isWhite) {
        continue;
      }

      if (opponent === 'black' && isWhite) {
        continue;
      }

      if (isValidMove({r:r,c:c}, king)) {
        return {r:r, c:c};
      }
    }
  }

  return null;
}

function triggerPromotion(pos, color) {
  pendingPromotion = {
    pos: pos,
    color: color
  };

  showPromotion(color);
}

function showPromotion(color) {
  var el = document.getElementById('promotion');
  var opts = ['q','r','b','n'];
  var i;
  var piece;

  el.innerHTML = 'Choose Promotion:<br>';

  for (i = 0; i < opts.length; i++) {
    piece = (color === 'white') ?
      opts[i].toUpperCase() :
      opts[i];

    el.innerHTML +=
      '<button onclick="applyPromotion(\'' +
      piece +
      '\')">' +
      pieces[piece] +
      '</button>';
  }

  el.style.display = 'block';
}

function applyPromotion(piece) {
  var pos = pendingPromotion.pos;

  board[pos.r][pos.c] = piece;
  pendingPromotion = null;

  document.getElementById('promotion').style.display = 'none';

  turn = (turn === 'white') ? 'black' : 'white';

  draw();
}

function makeMove(from, to) {
  var piece = board[from.r][from.c];

  if (
    piece.toLowerCase() === 'p' &&
    enPassant &&
    to.r === enPassant.r &&
    to.c === enPassant.c
  ) {
    board[from.r][to.c] = '';
  }

  if (
    piece.toLowerCase() === 'k' &&
    Math.abs(to.c - from.c) === 2
  ) {
    if (to.c === 6) {
      board[from.r][5] = board[from.r][7];
      board[from.r][7] = '';
    } else {
      board[from.r][3] = board[from.r][0];
      board[from.r][0] = '';
    }
  }

  board[to.r][to.c] = piece;
  board[from.r][from.c] = '';

  moved[from.r + '_' + from.c] = true;

  if (piece === 'P' && to.r === 0) {
    triggerPromotion(to, 'white');
    return;
  }

  if (piece === 'p' && to.r === 7) {
    triggerPromotion(to, 'black');
    return;
  }

  enPassant = null;

  if (
    piece.toLowerCase() === 'p' &&
    Math.abs(to.r - from.r) === 2
  ) {
    enPassant = {
      r: (from.r + to.r) / 2,
      c: from.c
    };
  }

  lastMove = {
    from: {r:from.r, c:from.c},
    to: {r:to.r, c:to.c}
  };
}

function handleTap(r, c) {
  if (gameOver || pendingPromotion) {
    return;
  }

  var piece = board[r][c];
  var attacker;

  if (!selected) {
    if (piece && isOwnPiece(piece)) {
      selected = {r:r, c:c};
    }
  } else {
    if (piece && isOwnPiece(piece)) {
      selected = {r:r, c:c};
    } else if (selected.r === r && selected.c === c) {
      selected = null;
    } else {
      if (
        isValidMove(selected, {r:r,c:c}) &&
        isLegalMove(selected, {r:r,c:c})
      ) {
        makeMove(selected, {r:r,c:c});

        if (!pendingPromotion) {
          turn = (turn === 'white') ? 'black' : 'white';

          checkmateSquare = null;
          checkingPieceSquare = null;

          if (isCheckmate(turn)) {
            gameOver = true;
            statusMessage =
              'Checkmate! ' +
              (turn === 'white' ? 'Black' : 'White') +
              ' wins';

            checkmateSquare = findKing(turn, board);

            attacker = findCheckingPiece(turn);

            if (attacker) {
              checkingPieceSquare = attacker;
            }

          } else if (isStalemate(turn)) {
            gameOver = true;
            statusMessage = 'Stalemate! Draw';

          } else if (isCheck(turn)) {
            attacker = findCheckingPiece(turn);

            if (attacker) {
              checkingPieceSquare = attacker;
            }
          }

          drawOfferedBy = null;
          document.getElementById('acceptDrawBtn').style.display = 'none';
        }
      }

      selected = null;
    }
  }

  draw();
}

function draw() {
  var html = '<table>';
  var r, c, dr, dc;
  var piece;
  var cls;
  var moves = getLegalMoves(selected);
  var i;
  var msg;

  for (r = 0; r < 8; r++) {
    html += '<tr>';

    for (c = 0; c < 8; c++) {
      dr = flipped ? 7 - r : r;
      dc = flipped ? 7 - c : c;

      cls = ((dr + dc) % 2) ? 'dark' : 'light';

      if (
        selected &&
        selected.r === dr &&
        selected.c === dc
      ) {
        cls += ' selected';
      }

      if (
        lastMove &&
        lastMove.from.r === dr &&
        lastMove.from.c === dc
      ) {
        cls += ' lastfrom';
      }

      if (
        lastMove &&
        lastMove.to.r === dr &&
        lastMove.to.c === dc
      ) {
        cls += ' lastto';
      }

      if (
        checkmateSquare &&
        checkmateSquare.r === dr &&
        checkmateSquare.c === dc
      ) {
        cls += ' mate';
      }

      if (
        checkingPieceSquare &&
        checkingPieceSquare.r === dr &&
        checkingPieceSquare.c === dc
      ) {
        cls += ' checking';
      }

      for (i = 0; i < moves.length; i++) {
        if (
          moves[i].r === dr &&
          moves[i].c === dc
        ) {
          cls += ' move';
          break;
        }
      }

      piece = board[dr][dc];

      html +=
        '<td onclick="handleTap(' +
        dr + ',' + dc + ')\" class=\"' + cls + '\">';

      if (piece) {
        html +=
          '<span class=\"' +
          (piece === piece.toUpperCase() ?
            'whitePiece' :
            'blackPiece') +
          '\">' +
          pieces[piece] +
          '</span>';
      } else {
        html += '&nbsp;';
      }

      html += '</td>';
    }

    html += '</tr>';
  }

  html += '</table>';

  document.getElementById('board').innerHTML = html;

  msg = statusMessage || ('Turn: ' + capitalize(turn));

  if (!gameOver && isCheck(turn)) {
    msg = 'Check! ' + msg;
  }

  if (drawOfferedBy && !gameOver) {
    msg += ' | Draw offered by ' + capitalize(drawOfferedBy);
  }

  document.getElementById('info').innerHTML = msg;
}

function resign() {
  if (gameOver) return;

  statusMessage =
    (turn === 'white' ? 'Black' : 'White') +
    ' wins (resignation)';

  gameOver = true;
  draw();
}

function offerDraw() {
  if (gameOver) return;

  drawOfferedBy = turn;
  document.getElementById('acceptDrawBtn').style.display = 'inline-block';

  draw();
}

function acceptDraw() {
  if (gameOver || !drawOfferedBy) return;

  statusMessage = 'Draw agreed';
  gameOver = true;
  drawOfferedBy = null;

  document.getElementById('acceptDrawBtn').style.display = 'none';

  draw();
}

function flipBoard() {
  flipped = !flipped;
  draw();
}

function resetGame() {
  initBoard();
}

initBoard();

</script>
</body>
</html>
