<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kobo Chess Puzzle Studio ES5</title>

<style>
body {
  max-width: 720px;
  margin: 0 auto;
  padding: 5px;
  font-family: sans-serif;
  text-align: center;
  background: #fff;
  color: #000;
}

h2 {
  margin: 8px 0;
}

#info {
  font-size: 18px;
  margin: 8px;
  min-height: 24px;
}

#board {
  margin: 10px auto;
}

#board table {
  border-collapse: collapse;
  margin: 0 auto;
  border: 2px solid #000;
}

#board td {
  width: 42px;
  height: 42px;
  text-align: center;
  vertical-align: middle;
  font-size: 0;
  border: 1px solid #666;
  cursor: pointer;
  padding: 0;
}

#board img {
  width: 30px;
  height: 30px;
  display: block;
  margin: auto;
}

.light {
  background: #eee;
}

.dark {
  background: #aaa;
}

.selected {
  outline: 2px solid #222;
}

.move {
  box-shadow: inset 0 0 0 1px #444;
}

.lastfrom {
  box-shadow: inset 0 0 0 2px #666;
}

.lastto {
  box-shadow: inset 0 0 0 2px #222;
}

.checking {
  outline: 3px dotted #000;
}

.mate {
  box-shadow: inset 0 0 10px 4px #000;
}

.whitePiece {
  font-weight: normal;
  text-shadow: 0 0 1px #000;
}

.blackPiece {
  font-weight: bold;
}

.controls {
  margin: 10px;
}

.controls button {
  font-size: 16px;
  padding: 6px 10px;
  margin: 4px;
}

input {
  width: 85%;
  font-size: 14px;
  padding: 4px;
}
</style>
</head>

<body>

<h2>Kobo Chess Puzzle Studio</h2>

<div id="info">Setup Mode</div>
<div id="board"></div>

<div class="controls">

  <button onclick="loadPuzzleFile()">Load Puzzle</button>
  <button onclick="loadNextPuzzle()">Next Puzzle</button>

  <button onclick="prevMove()">◀</button>
  <button onclick="nextMove()">▶</button>

  <button onclick="startSolutionMode()">💡</button>
  <button onclick="flipBoard()">Flip</button>
  <button onclick="resetPuzzle()">Reset</button>
  <button onclick="backToSetup()">Edit</button>

</div>

<div class="controls">

White:
<button onclick="selectPiece('K')">WK</button>
<button onclick="selectPiece('Q')">WQ</button>
<button onclick="selectPiece('R')">WR</button>
<button onclick="selectPiece('B')">WB</button>
<button onclick="selectPiece('N')">WN</button>
<button onclick="selectPiece('P')">WP</button>

<br>

Black:
<button onclick="selectPiece('k')">BK</button>
<button onclick="selectPiece('q')">BQ</button>
<button onclick="selectPiece('r')">BR</button>
<button onclick="selectPiece('b')">BB</button>
<button onclick="selectPiece('n')">BN</button>
<button onclick="selectPiece('p')">BP</button>

<br>

<button onclick="selectPiece('')">Clear Square</button>
<button onclick="clearBoard()">Clear Board</button>

<button onclick="setTurn('white')">White to Play</button>
<button onclick="setTurn('black')">Black to Play</button>

<button onclick="doneSetup()">GO</button>

</div>

<div class="controls">
  <input id="pgnInput" placeholder="Paste Kindle/Lichess puzzle here">
  <br>
  <button onclick="loadPGN()">Load PGN Puzzle</button>
</div>

<script>

var pieces = {
  r:'♜',
  n:'♞',
  b:'♝',
  q:'♛',
  k:'♚',
  p:'♟',
  R:'♖',
  N:'♘',
  B:'♗',
  Q:'♕',
  K:'♔',
  P:'♙'
};

var board = [];
var selected = null;
var turn = 'white';
var flipped = false;

var setupMode = true;
var selectedPiece = '';

var initialBoard = null;
var initialTurn = 'white';

var puzzleGoal = '';
var solutionMoves = [];
var solutionIndex = 0;
var solutionMode = false;
var puzzleCompleted = false;

var moveHistory = [];
var historyIndex = 0;

var lastMove = null;
var checkmateSquare = null;
var checkingPieceSquare = null;

function cloneBoard(src) {
  return JSON.parse(JSON.stringify(src));
}

function initEmptyBoard() {
  board = [];
  var r, c, row;

  for (r = 0; r < 8; r++) {
    row = [];
    for (c = 0; c < 8; c++) {
      row.push('');
    }
    board.push(row);
  }
}

function initStandardBoard() {
  board = [
    ['r','n','b','q','k','b','n','r'],
    ['p','p','p','p','p','p','p','p'],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['P','P','P','P','P','P','P','P'],
    ['R','N','B','Q','K','B','N','R']
  ];
}

function selectPiece(p) {
  selectedPiece = p;
}

function clearBoard() {
  initEmptyBoard();
  draw();
}

function setTurn(t) {
  turn = t;
  draw();
}

	function doneSetup() {
  setupMode = false;
  puzzleCompleted = false;
  solutionMode = false;
  solutionIndex = 0;

  initialBoard = cloneBoard(board);
  initialTurn = turn;

  moveHistory = [cloneBoard(board)];
  historyIndex = 0;

  selected = null;
  lastMove = null;

  draw();
}

function backToSetup() {
  setupMode = true;
  selected = null;
  solutionMode = false;
  draw();
}

function flipBoard() {
  flipped = !flipped;
  draw();
}

function isWhitePiece(p) {
  if (!p) return false;
  return p === p.toUpperCase();
}

function parseSquare(s) {
  return {
    c: s.charCodeAt(0) - 97,
    r: 8 - parseInt(s.charAt(1), 10)
  };
}

function draw() {

  var html = '<table>';
  var vr, vc, r, c, cls, p;

  for (vr = 0; vr < 8; vr++) {

    html += '<tr>';

    for (vc = 0; vc < 8; vc++) {

      r = flipped ? (7 - vr) : vr;
      c = flipped ? (7 - vc) : vc;

      cls = ((r + c) % 2) ? 'dark' : 'light';

      if (selected && selected.r === r && selected.c === c) {
        cls += ' selected';
      }

      if (lastMove) {
        if (lastMove.from.r === r && lastMove.from.c === c) {
          cls += ' lastfrom';
        }
        if (lastMove.to.r === r && lastMove.to.c === c) {
          cls += ' lastto';
        }
      }

      html += '<td class="' + cls + '" onclick="handleTap(' + r + ',' + c + ')">';

      p = board[r][c];
      if (p) {
        if (isWhitePiece(p)) {
          html += '<span class="whitePiece">' + pieces[p] + '</span>';
        } else {
          html += '<span class="blackPiece">' + pieces[p] + '</span>';
        }
      }

      html += '</td>';
    }

    html += '</tr>';
  }

  html += '</table>';

  document.getElementById('board').innerHTML = html;

  var msg = '';

  if (setupMode) {
    msg = 'Setup Mode';
  }
  else if (puzzleCompleted) {
    msg = 'Puzzle Completed!';
  }
  else {
    msg = (turn === 'white' ? 'White' : 'Black') + ' to play';
    if (puzzleGoal) {
      msg += ' | ' + puzzleGoal;
    }
  }

  document.getElementById('info').innerHTML = msg;
}

function handleTap(r, c) {

  if (setupMode) {
    board[r][c] = selectedPiece;
    draw();
    return;
  }

  if (solutionMode) {
    playSolutionMove();
    return;
  }

  if (!selected) {

    if (!board[r][c]) return;

    if (turn === 'white' && !isWhitePiece(board[r][c])) return;
    if (turn === 'black' && isWhitePiece(board[r][c])) return;

    selected = { r:r, c:c };
    draw();
    return;
  }

  attemptMove(selected, { r:r, c:c });
  selected = null;
  draw();
}

function makeMove(from, to) {

  moveHistory.push(cloneBoard(board));
  historyIndex++;

  board[to.r][to.c] = board[from.r][from.c];
  board[from.r][from.c] = '';

  lastMove = {
    from: { r:from.r, c:from.c },
    to: { r:to.r, c:to.c }
  };

  turn = (turn === 'white') ? 'black' : 'white';
}

function attemptMove(from, to) {

  if (
    solutionMoves.length > 0 &&
    solutionIndex < solutionMoves.length
  ) {

    var exp = solutionMoves[solutionIndex];
    var ef = parseSquare(exp.substring(0,2));
    var et = parseSquare(exp.substring(2,4));

    if (
      from.r === ef.r &&
      from.c === ef.c &&
      to.r === et.r &&
      to.c === et.c
    ) {

      makeMove(from, to);
      solutionIndex++;

      if (solutionIndex >= solutionMoves.length) {
        puzzleCompleted = true;
      }
    }

    return;
  }

  makeMove(from, to);
}

function prevMove() {

  if (historyIndex <= 0) return;

  historyIndex--;
  board = cloneBoard(moveHistory[historyIndex]);
  draw();
}

function nextMove() {

  if (solutionIndex >= solutionMoves.length) return;

  var mv = solutionMoves[solutionIndex];
  var from = parseSquare(mv.substring(0,2));
  var to = parseSquare(mv.substring(2,4));

  makeMove(from, to);
  solutionIndex++;
  draw();
}

function resetPuzzle() {

  if (!initialBoard) return;

  board = cloneBoard(initialBoard);
  turn = initialTurn;

  selected = null;
  solutionIndex = 0;
  solutionMode = false;
  puzzleCompleted = false;

  moveHistory = [cloneBoard(board)];
  historyIndex = 0;

  lastMove = null;

  draw();
}

function startSolutionMode() {
  solutionMode = true;
}

function playSolutionMove() {
  nextMove();
}

function applyPGNMove(move) {

  if (!move) return;

  move = move.replace(/[+#?!]/g, '');

  if (move === 'O-O') {
    if (turn === 'white') {
      board[7][6] = 'K';
      board[7][5] = 'R';
      board[7][4] = '';
      board[7][7] = '';
    } else {
      board[0][6] = 'k';
      board[0][5] = 'r';
      board[0][4] = '';
      board[0][7] = '';
    }
    turn = (turn === 'white') ? 'black' : 'white';
    return;
  }

  if (move === 'O-O-O') {
    if (turn === 'white') {
      board[7][2] = 'K';
      board[7][3] = 'R';
      board[7][4] = '';
      board[7][0] = '';
    } else {
      board[0][2] = 'k';
      board[0][3] = 'r';
      board[0][4] = '';
      board[0][0] = '';
    }
    turn = (turn === 'white') ? 'black' : 'white';
    return;
  }

  var piece = 'P';
  var target, to;
  var r, c, p;

  if (/^[KQRBN]/.test(move.charAt(0))) {
    piece = move.charAt(0);
  }

  target = move.slice(-2);

  if (!/^[a-h][1-8]$/.test(target)) {
    return;
  }

  to = parseSquare(target);

  for (r = 0; r < 8; r++) {
    for (c = 0; c < 8; c++) {

      p = board[r][c];
      if (!p) continue;

      if (turn === 'white') {
        if (p !== piece) continue;
      } else {
        if (p !== piece.toLowerCase()) continue;
      }

      board[to.r][to.c] = p;
      board[r][c] = '';

      turn = (turn === 'white') ? 'black' : 'white';
      return;
    }
  }
}

function loadPGN() {

  var raw = document.getElementById('pgnInput').value;
  if (!raw) return;

  raw = raw.replace(/^\s+|\s+$/g, '');

  var parts = raw.split('|');

  puzzleGoal = parts[0] || 'To win';

  var history = parts[1] || '';
  var solution = parts[2] || '';

  initStandardBoard();
  turn = 'white';

  var moves = history.split(/\s+/);
  var i;

  for (i = 0; i < moves.length; i++) {
    applyPGNMove(moves[i]);
  }

  solutionMoves = [];

  if (solution.replace(/\s+/g,'')) {
    solutionMoves = solution.split(/\s+/);
  }

  solutionIndex = 0;
  solutionMode = false;
  puzzleCompleted = false;
  setupMode = false;

  initialBoard = cloneBoard(board);
  initialTurn = turn;

  moveHistory = [cloneBoard(board)];
  historyIndex = 0;

  lastMove = null;
  selected = null;

  draw();
}

function loadPuzzleFile() {

  document.getElementById('info').innerHTML =
    'Fetching Lichess daily puzzle...';

  var xhr = new XMLHttpRequest();

  xhr.onreadystatechange = function() {

    if (xhr.readyState !== 4) return;

    if (xhr.status !== 200) {
      document.getElementById('info').innerHTML =
        'Lichess fetch failed';
      return;
    }

    try {

      var data = JSON.parse(xhr.responseText);
      var goal = 'To win';

      if (
        data.puzzle &&
        data.puzzle.themes &&
        data.puzzle.solution &&
        data.puzzle.themes.indexOf('mate') >= 0
      ) {
        goal = 'Mate in ' +
          Math.ceil(data.puzzle.solution.length / 2);
      }

      var pgn = data.game.pgn || '';

      pgn = pgn.replace(/\[[^\]]*\]/g, '');
      pgn = pgn.replace(/\d+\./g, '');
      pgn = pgn.replace(/1-0|0-1|1\/2-1\/2|\*/g, '');
      pgn = pgn.replace(/^\s+|\s+$/g, '');

      var compact =
        goal + '|' +
        pgn + '|' +
        data.puzzle.solution.join(' ');

      document.getElementById('pgnInput').value = compact;

      loadPGN();

    } catch(e) {
      document.getElementById('info').innerHTML =
        'Puzzle parse error';
    }
  };

  xhr.open(
    'GET',
    'https://lichess.org/api/puzzle/daily',
    true
  );

  xhr.send();
}

function loadNextPuzzle() {
  loadPuzzleFile();
}

initEmptyBoard();
draw();

</script>
</body>
</html>
